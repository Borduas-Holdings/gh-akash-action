name: 'Close Akash Deployment'
description: 'Close a deployment on Akash Network'
author: 'Akash Network Team'

branding:
  icon: 'x-circle'
  color: 'red'

inputs:
  mnemonic:
    description: 'Wallet mnemonic phrase for signing transactions. Should be stored as a GitHub secret.'
    required: true

  filter:
    description: 'Filter to select deployments to close'
    required: true

  gas:
    description: 'Gas limit for transactions'
    required: false
    default: 'auto'

  gas-multiplier:
    description: 'Gas multiplier (used when gas is "auto")'
    required: false
    default: '1.5'

  fee:
    description: 'Fee amount in the smallest denomination'
    required: false
    default: ''

  denom:
    description: 'Token denomination for fees'
    required: false
    default: 'uakt'

  rpc-endpoints:
    description: |
      Newline or comma-separated list of Akash RPC base URLs for failover.
      The action health-checks each in order and uses the first that responds.
      Default: 6 well-known public endpoints (rpc.akt.dev, polkachu, bronbro, publicnode, ecostake, akashnet).
    required: false

  rest-url:
    description: '[Deprecated — use rpc-endpoints] REST API URL override. Skips failover when set.'
    required: false

  tx-rpc-url:
    description: '[Deprecated — use rpc-endpoints] RPC URL override. Skips failover when set.'
    required: false

outputs:
  deployment-id:
    description: 'The closed deployment ID (owner/dseq)'

  tx-hash:
    description: 'The transaction hash of the close deployment transaction'

runs:
  using: 'node24'
  main: 'dist/index.js'
